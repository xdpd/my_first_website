<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Random Facts</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="{{ mode }}">
    <div class="top-right">
        <form method="get" style="display:inline;">
            <input type="hidden" name="theme" value="{{ theme }}">
            <input type="hidden" name="mode" value="{{ mode }}">
            <select name="lang" onchange="this.form.submit()" class="lang-select">
                <option value="en" {% if lang=='en' %}selected{% endif %}>English</option>
                <option value="ua" {% if lang=='ua' %}selected{% endif %}>Українська</option>
            </select>
        </form>

        <form method="get" style="display:inline;">
            <input type="hidden" name="theme" value="{{ theme }}">
            <input type="hidden" name="lang" value="{{ lang }}">
            <input type="hidden" name="mode" value="{% if mode=='dark' %}light{% else %}dark{% endif %}">
            <button type="submit" class="theme-btn">{% if mode=='dark' %}Light{% else %}Dark{% endif %}</button>
        </form>
    </div>

    <div class="container">
        <h1>Random Facts Generator</h1>

        <p id="fact">{{ fact }}</p>

        <div class="buttons">
            <a href="/?theme=cat&lang={{ lang }}&mode={{ mode }}" class="btn">Cat Fact</a>
            <a href="/?theme=general&lang={{ lang }}&mode={{ mode }}" class="btn">General Fact</a>
            <a href="/?theme=dog&lang={{ lang }}&mode={{ mode }}" class="btn">Dog Fact</a>
        </div>
    </div>
</body>
</html>
